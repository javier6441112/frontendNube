<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito de Compras</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Carrito de Compras</h1>
      <p>Gestión básica de productos conectada al backend Spring Boot.</p>
    </div>
    <button id="btnRecargar" class="btn btn-secondary">Recargar productos</button>
  </header>

  <main class="container">
    <section class="card">
      <h2>Agregar producto</h2>

      <form id="productoForm" class="form">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input id="nombre" name="nombre" type="text" placeholder="Ej. Laptop" required />
        </div>

        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" name="descripcion" rows="3" placeholder="Descripción del producto"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="precio">Precio</label>
            <input id="precio" name="precio" type="number" min="0" step="0.01" placeholder="0.00" required />
          </div>

          <div class="form-group">
            <label for="stock">Stock</label>
            <input id="stock" name="stock" type="number" min="0" step="1" placeholder="0" required />
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Guardar producto</button>
      </form>

      <p id="mensaje" class="message" aria-live="polite"></p>
    </section>

    <section class="card">
      <div class="section-header">
        <div>
          <h2>Productos registrados</h2>
          <p id="contador" class="muted">Cargando productos...</p>
        </div>

        <input id="buscador" class="search" type="search" placeholder="Buscar por nombre..." />
      </div>

      <div id="loading" class="loading">Cargando...</div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Precio</th>
              <th>Stock</th>
            </tr>
          </thead>
          <tbody id="productosBody"></tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state hidden">
        No hay productos para mostrar.
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
